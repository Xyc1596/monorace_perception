# 焦距（mm）
f: 75
# 相机姿态欧拉角（偏航Z-俯仰Y-滚转X，deg）
cam_euler: [-30, 20, 0]
# 相机姿态四元数（WXYZ）
cam_quat: [0.409576, 0.286788, 0.496732, 0.709406]
# 相机坐标（XYZ，m）
cam_pos: [-15, -9, 6]

# 图像高度（像素）
h: 128
# 图像宽度（像素）
w: 128

# 门框中心坐标（XYZ，m）
gate_center_pos: [0, 0, 0]
# 门框偏航角（Z，deg，门框法向量指向无人机穿过方向）
gate_yaw: 0
# 真实外侧角点
original_outer_corners: [[34, 26], [87, 33], [85, 91], [36, 80]]
# 真实内侧角点
original_inner_corners: [[48, 44], [71, 48], [71, 73], [48, 69]]